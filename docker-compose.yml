services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: nexus_finance_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexus_finance_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: nexus_minio
      MINIO_ROOT_PASSWORD: nexus_minio_secret
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set nexus http://minio:9000 nexus_minio nexus_minio_secret;
      mc mb --ignore-existing nexus/nexus-uploads;
      mc anonymous set none nexus/nexus-uploads;
      exit 0;
      "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4443:4443"
    environment:
      PORT: 4443
      NODE_ENV: local
      DATABASE_NAME: nexus_finance_platform
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: nexus_minio
      MINIO_SECRET_KEY: nexus_minio_secret
      MINIO_BUCKET: nexus-uploads
      MINIO_USE_SSL: "false"
      JWT_ACCESS_SECRET: 5a92c4d604f800f679ee9f44325045bddf13a601c4370d8e3cf23c8202dfe495
      JWT_REFRESH_SECRET: 48beb9e766e82a7921e6f74fcf3d8750a976bbb3ceef968868138e749452ab96
    volumes:
      - ./backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  miniodata:
