services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: nexus_finance_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexus_finance_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4443:4443"
    environment:
      PORT: 4443
      NODE_ENV: local
      DATABASE_NAME: nexus_finance_platform
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
    volumes:
      - ./backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
